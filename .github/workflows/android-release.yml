name: Android Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

defaults:
  run:
    shell: pwsh

env:
  JAVA_VERSION: "17"
  ANDROID_PLATFORM: "android-36"
  ANDROID_BUILD_TOOLS: "36.0.0"
  ANDROID_NDK_VERSION: "27.2.12479018"
  ONNX_RUNTIME_VERSION: "1.20.0"

jobs:
  build-release:
    name: Build signed APK and AAB
    runs-on: windows-latest
    timeout-minutes: 90
    environment: release
    env:
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          lfs: true

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Ensure Rust toolchain
        run: |
          if (-not (Get-Command rustup -ErrorAction SilentlyContinue)) {
            $rustupInit = Join-Path $env:RUNNER_TEMP "rustup-init.exe"
            Invoke-WebRequest -Uri "https://win.rustup.rs/x86_64" -OutFile $rustupInit
            & $rustupInit -y --default-toolchain stable
          }

          "$env:USERPROFILE\.cargo\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          $env:PATH = "$env:USERPROFILE\.cargo\bin;$env:PATH"

          & rustup toolchain install stable --profile minimal
          & rustup default stable
          & rustup --version
          & cargo --version

      - name: Locate Android SDK
        run: |
          $sdkRoot = if ($env:ANDROID_SDK_ROOT) {
            $env:ANDROID_SDK_ROOT
          } elseif ($env:ANDROID_HOME) {
            $env:ANDROID_HOME
          } else {
            Join-Path $env:LOCALAPPDATA "Android\Sdk"
          }

          if (-not (Test-Path $sdkRoot)) {
            throw "Android SDK root not found: $sdkRoot"
          }

          $sdkManager = @(
            (Join-Path $sdkRoot "cmdline-tools\latest\bin\sdkmanager.bat"),
            (Join-Path $sdkRoot "cmdline-tools\bin\sdkmanager.bat"),
            (Join-Path $sdkRoot "tools\bin\sdkmanager.bat")
          ) | Where-Object { Test-Path $_ } | Select-Object -First 1

          if (-not $sdkManager) {
            throw "sdkmanager.bat was not found under $sdkRoot"
          }

          "ANDROID_SDK_ROOT=$sdkRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "ANDROID_HOME=$sdkRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "SDKMANAGER=$sdkManager" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          $escapedSdkRoot = $sdkRoot.Replace('\', '\\')
          "sdk.dir=$escapedSdkRoot" | Set-Content -Path "android/local.properties" -Encoding ascii

      - name: Install Android SDK components
        run: |
          $licenses = 1..20 | ForEach-Object { "y" }
          $licenses | & $env:SDKMANAGER "--sdk_root=$env:ANDROID_SDK_ROOT" --licenses | Out-Host

          & $env:SDKMANAGER "--sdk_root=$env:ANDROID_SDK_ROOT" `
            $env:ANDROID_PLATFORM `
            "build-tools;$env:ANDROID_BUILD_TOOLS" `
            "ndk;$env:ANDROID_NDK_VERSION"

      - name: Prepare signing keystore
        run: |
          if ($env:KEYSTORE_FILE -and (Test-Path $env:KEYSTORE_FILE)) {
            Write-Host "Using KEYSTORE_FILE from the runner environment."
          } elseif ($env:KEYSTORE_BASE64) {
            $keystoreDir = Join-Path $env:RUNNER_TEMP "android-signing"
            $keystorePath = Join-Path $keystoreDir "release.keystore"

            New-Item -ItemType Directory -Force -Path $keystoreDir | Out-Null
            [System.IO.File]::WriteAllBytes($keystorePath, [Convert]::FromBase64String($env:KEYSTORE_BASE64))

            "KEYSTORE_FILE=$keystorePath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            Write-Host "Prepared signing keystore for this workflow run."
          } else {
            throw "Missing signing keystore. Set KEYSTORE_BASE64 in GitHub secrets for hosted runners, or define KEYSTORE_FILE on a self-hosted runner."
          }

      - name: Install ONNX Runtime Android
        run: |
          $installRoot = Join-Path $HOME "onnxruntime-android"
          .\tools\Update-OnnxRuntimeAndroid.ps1 -Version $env:ONNX_RUNTIME_VERSION -InstallRoot $installRoot
          $onnxJniRoot = Join-Path $installRoot "jni"
          "ONNX_JNI_ROOT=$onnxJniRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build signed release artifacts
        working-directory: android
        run: |
          .\gradlew.bat --no-daemon clean assembleRelease bundleRelease "-PsupertonicOnnxJniRoot=$env:ONNX_JNI_ROOT"

      - name: Verify signed release APKs
        run: |
          $buildToolsRoot = Join-Path $env:ANDROID_SDK_ROOT "build-tools"
          $buildToolsDir = Get-ChildItem $buildToolsRoot -Directory | Sort-Object Name -Descending | Select-Object -First 1
          if (-not $buildToolsDir) {
            throw "Android build-tools directory not found under $buildToolsRoot"
          }

          $zipalign = Join-Path $buildToolsDir.FullName "zipalign.exe"
          $apksigner = Join-Path $buildToolsDir.FullName "apksigner.bat"

          Get-ChildItem "android/app/build/outputs/apk/release/*.apk" | ForEach-Object {
            & $zipalign -c -P 16 4 $_.FullName
            if ($LASTEXITCODE -ne 0) {
              throw "zipalign validation failed for $($_.FullName)"
            }

            & $apksigner verify $_.FullName
            if ($LASTEXITCODE -ne 0) {
              throw "apksigner verification failed for $($_.FullName)"
            }
          }

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload release AAB
        uses: actions/upload-artifact@v4
        with:
          name: android-release-aab
          path: android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
          retention-days: 30
